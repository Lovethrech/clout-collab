<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"> -->
        <style>
            :root{
                --purple:#6D28D9; --blue:#3B82F6; --pink:#EC4899;
                --pink-300:#F9A8D4; --slate-50:#F8FAFC; --slate-400:#94A3B8;
                --slate-800:#1E293B; --slate-900:#0F172A;
                --success:#22C55E;
                --grad: linear-gradient(135deg, var(--purple), var(--blue) 52%, var(--pink));
                --display:'Unbounded',sans-serif; --body:'Plus Jakarta Sans',sans-serif; --mono:'JetBrains Mono',monospace;
            }

            .lockup{ display:flex; align-items:center; gap:10px; margin-bottom:34px; }
            .lockup .mark{ width:32px;height:32px;border-radius:9px;background:var(--grad); display:flex;align-items:center;justify-content:center; flex-shrink:0; }
            .lockup .mark svg{ width:16px;height:16px; }
            .lockup .word{ font-family:var(--display); font-weight:700; font-size:15px; }
        </style>
    </head>

    <body>
        <div class="lockup">
            <!-- .next-pill:hover{
                cursor: pointer;
                transform:translateX(3px); 
                border-color:#3B4A6B;
                } -->
            <!-- text-decoration:none; -->
            <!-- transition:transform .15s ease, border-color .15s ease;  -->
            <div class="mark"><svg viewBox="0 0 200 200"><polygon points="120,38 76,108 99,108 87,164 142,94 113,94" fill="#fff"/></svg></div>
            <div class="word">Clout Collabs</div>
        </div>
    </body>
</html>
