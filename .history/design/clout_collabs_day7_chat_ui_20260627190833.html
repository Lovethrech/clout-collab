<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Clout Collabs | Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0F172A; --bg2:#0B1220; --card:#1E293B; --card-hi:#243350;
  --border:rgba(255,255,255,0.07); --border-hi:rgba(255,255,255,0.13);
  --purple:#6D28D9; --purple-md:#7C3AED; --purple-lt:#A78BFA;
  --blue:#3B82F6; --blue-lt:#93C5FD; --pink:#EC4899; --pink-lt:#F9A8D4;
  --green:#10B981; --green-lt:#6EE7B7;
  --tx-1:#F8FAFC; --tx-2:#94A3B8; --tx-3:#64748B; --tx-4:#475569;
  --r-card:16px; --r-chip:100px; --font:'Inter',-apple-system,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font);color:var(--tx-1);-webkit-font-smoothing:antialiased;}
.app{position:fixed;inset:0;background:var(--bg);}

/* ── NAV ─────────────────────────────────── */
.nav-bar{
  position:absolute;top:0;left:0;right:0;height:60px;z-index:300;
  background:rgba(11,18,32,0.94);backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);
  padding:0 16px;display:flex;align-items:center;
}
.nav-mode{display:flex;align-items:center;gap:10px;width:100%;}
#navChat{display:none;}
.app.chat-mode #navInbox{display:none;}
.app.chat-mode #navChat{display:flex;}

.nav-logo{font-size:17px;font-weight:800;letter-spacing:-0.4px;flex:1;
  background:linear-gradient(135deg,var(--purple-lt),var(--blue-lt));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-actions{display:flex;align-items:center;gap:9px;margin-left:auto;}
.nav-btn{width:34px;height:34px;border-radius:50%;background:var(--card);
  border:1px solid var(--border);color:var(--tx-2);font-size:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background 0.18s;position:relative;}
.nav-btn:hover{background:var(--card-hi);}
.nav-notif{position:absolute;top:7px;right:7px;width:6px;height:6px;
  border-radius:50%;background:var(--pink);border:2px solid var(--bg);}
.nav-avatar{width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,0.14);cursor:pointer;}

/* Chat nav elements */
.nav-back{width:34px;height:34px;border-radius:50%;background:var(--card);
  border:1px solid var(--border);color:var(--tx-2);font-size:17px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;transition:background 0.18s;}
.nav-back:hover{background:var(--card-hi);}
.chat-hd-info{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.chat-hd-ava{width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0;position:relative;}
.chat-hd-online{position:absolute;bottom:1px;right:1px;width:9px;height:9px;
  border-radius:50%;background:var(--green);border:2px solid var(--bg2);}
.chat-hd-name{font-size:14px;font-weight:700;color:var(--tx-1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chat-hd-status{font-size:11px;color:var(--tx-3);margin-top:1px;}
.chat-hd-status.online-txt{color:var(--green-lt);}

/* ── PANES ───────────────────────────────── */
.pane{position:absolute;top:60px;left:0;right:0;bottom:70px;
  overflow-x:hidden;transition:transform 0.38s cubic-bezier(0.32,0,0.15,1),opacity 0.3s;}
.pane::-webkit-scrollbar{display:none;}
#paneInbox{overflow-y:auto;transform:translateX(0);opacity:1;pointer-events:all;}
#paneChat{transform:translateX(100%);opacity:0;pointer-events:none;
  display:flex;flex-direction:column;bottom:70px;}

.app.chat-mode #paneInbox{transform:translateX(-28%);opacity:0.3;pointer-events:none;}
.app.chat-mode #paneChat{transform:translateX(0);opacity:1;pointer-events:all;bottom:0;}
.app.chat-mode .btm-nav{transform:translateY(100%);}

/* ── INBOX ───────────────────────────────── */
.inbox-head{padding:22px 20px 0;}
.inbox-title{font-size:26px;font-weight:800;letter-spacing:-0.6px;}
.inbox-sub{font-size:14px;color:var(--tx-2);margin-top:4px;}

.inbox-search{padding:14px 20px 0;}
.search-box{position:relative;}
.s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--tx-3);font-size:14px;pointer-events:none;}
.s-inp{width:100%;height:42px;padding:0 14px 0 38px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  color:var(--tx-1);font-family:var(--font);font-size:14px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;}
.s-inp::placeholder{color:var(--tx-3);}
.s-inp:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,40,217,0.15);}

.section-label{font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;color:var(--tx-3);padding:16px 20px 8px;}

.conv-list{padding-bottom:16px;}

/* Conversation item */
.conv-item{display:flex;align-items:center;gap:12px;
  padding:12px 20px;cursor:pointer;
  transition:background 0.18s;position:relative;}
.conv-item:hover{background:rgba(255,255,255,0.03);}
.conv-item.unread{background:rgba(109,40,217,0.04);}
.conv-item.unread:hover{background:rgba(109,40,217,0.07);}

/* Divider between items */
.conv-item+.conv-item::before{
  content:'';position:absolute;top:0;left:72px;right:20px;height:1px;
  background:var(--border);}

.conv-ava-wrap{position:relative;flex-shrink:0;}
.conv-ava{width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;}
.conv-online{position:absolute;bottom:2px;right:2px;width:11px;height:11px;
  border-radius:50%;background:var(--green);border:2.5px solid var(--bg);}

.conv-body{flex:1;min-width:0;}
.conv-name-row{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:3px;}
.conv-name{font-size:14px;font-weight:600;color:var(--tx-1);}
.conv-item.unread .conv-name{font-weight:700;}
.conv-time{font-size:11px;color:var(--tx-3);}
.conv-item.unread .conv-time{color:var(--purple-lt);font-weight:600;}
.conv-last-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.conv-last{font-size:13px;color:var(--tx-3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.conv-item.unread .conv-last{color:var(--tx-2);font-weight:500;}
.unread-badge{min-width:18px;height:18px;padding:0 5px;
  border-radius:100px;background:var(--purple);color:#fff;
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── CHAT THREAD ─────────────────────────── */
.msg-list{flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 16px 8px;
  display:flex;flex-direction:column;gap:2px;}
.msg-list::-webkit-scrollbar{display:none;}

/* Date separator */
.date-sep{text-align:center;margin:10px 0 8px;}
.date-sep span{font-size:11px;font-weight:500;color:var(--tx-4);
  background:var(--bg);padding:3px 10px;border-radius:100px;
  border:1px solid var(--border);}

/* Message row */
.msg-row{display:flex;align-items:flex-end;gap:7px;margin-bottom:2px;}
.msg-row.out{flex-direction:row-reverse;}
.msg-row.gap{margin-top:10px;}

/* Avatar next to message */
.msg-ava{width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;flex-shrink:0;align-self:flex-end;}
.msg-ava.placeholder{visibility:hidden;}

/* Bubble */
.bubble{max-width:72%;padding:9px 13px;line-height:1.52;
  font-size:14px;position:relative;word-break:break-word;}

/* Incoming bubble */
.bubble-in{
  background:var(--card);border:1px solid var(--border-hi);
  color:var(--tx-1);
  border-radius:18px 18px 18px 4px;
}
/* Consecutive incoming */
.msg-row.seq-in .bubble-in{border-radius:4px 18px 18px 4px;}
.msg-row.last-in .bubble-in{border-radius:4px 18px 18px 18px;}

/* Outgoing bubble — signature Day 7 element */
.bubble-out{
  background:var(--purple);color:#fff;
  border-radius:18px 18px 4px 18px;
}
.msg-row.seq-out .bubble-out{border-radius:18px 4px 4px 18px;}
.msg-row.last-out .bubble-out{border-radius:18px 4px 18px 18px;}

/* Message meta (time + receipt) */
.msg-meta{display:flex;align-items:center;gap:4px;margin-top:4px;justify-content:flex-end;}
.msg-time{font-size:10px;opacity:0.6;}
.msg-receipt{font-size:11px;line-height:1;}
.msg-receipt.read{color:var(--blue-lt);}
.msg-receipt.delivered{opacity:0.6;}
.msg-receipt.sent{opacity:0.45;}

/* Typing indicator */
.typing-row{display:flex;align-items:flex-end;gap:7px;margin-top:8px;}
.typing-bubble{background:var(--card);border:1px solid var(--border-hi);
  border-radius:18px 18px 18px 4px;padding:12px 14px;
  display:flex;align-items:center;gap:4px;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--tx-3);
  animation:tdot 1.3s infinite ease-in-out;}
.typing-dot:nth-child(2){animation-delay:0.15s;}
.typing-dot:nth-child(3){animation-delay:0.3s;}
@keyframes tdot{
  0%,60%,100%{transform:translateY(0);opacity:0.4;}
  30%{transform:translateY(-5px);opacity:1;}
}

/* ── INPUT BAR ───────────────────────────── */
.input-bar{
  flex-shrink:0;
  padding:10px 14px 14px;
  background:rgba(11,18,32,0.97);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  display:flex;align-items:flex-end;gap:9px;
}
.attach-btn{width:38px;height:38px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  color:var(--tx-2);font-size:16px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;flex-shrink:0;
  transition:background 0.18s;}
.attach-btn:hover{background:var(--card-hi);}
.inp-wrap{flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:22px;padding:8px 14px;
  display:flex;align-items:center;transition:border-color 0.2s,box-shadow 0.2s;}
.inp-wrap:focus-within{border-color:var(--purple);box-shadow:0 0 0 3px rgba(109,40,217,0.13);}
.msg-inp{flex:1;background:none;border:none;outline:none;
  color:var(--tx-1);font-family:var(--font);font-size:14px;
  resize:none;max-height:120px;overflow-y:auto;line-height:1.5;}
.msg-inp::placeholder{color:var(--tx-3);}
.emoji-btn{color:var(--tx-3);font-size:17px;cursor:pointer;
  background:none;border:none;padding:0 0 0 6px;flex-shrink:0;}
.send-btn{width:38px;height:38px;border-radius:50%;
  background:var(--purple);border:none;color:#fff;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 2px 10px rgba(109,40,217,0.4);
  transition:background 0.2s,transform 0.18s,box-shadow 0.2s;
  opacity:0.45;pointer-events:none;}
.send-btn.ready{opacity:1;pointer-events:all;}
.send-btn.ready:hover{background:var(--purple-md);transform:scale(1.06);}

/* ── BOTTOM NAV ──────────────────────────── */
.btm-nav{position:absolute;bottom:0;left:0;right:0;height:70px;z-index:200;
  background:rgba(11,18,32,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;padding:0 6px 4px;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.btm-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 0;border-radius:10px;cursor:pointer;transition:background 0.18s;}
.btm-tab:hover{background:rgba(255,255,255,0.03);}
.btm-ico{font-size:19px;color:var(--tx-3);line-height:1;transition:color 0.18s,transform 0.18s;}
.btm-lbl{font-size:10px;font-weight:500;color:var(--tx-3);transition:color 0.18s;}
.btm-tab.act .btm-ico,.btm-tab.act .btm-lbl{color:var(--purple-lt);}
.btm-tab:hover .btm-ico{transform:translateY(-1px);}

/* ── NEW MESSAGE FAB (inbox only) ─────────── */
.compose-fab{position:absolute;bottom:86px;right:20px;z-index:250;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple-md),var(--pink));
  border:none;color:#fff;font-size:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(109,40,217,0.5);cursor:pointer;
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s,opacity 0.25s;}
.compose-fab:hover{transform:scale(1.07);box-shadow:0 6px 26px rgba(109,40,217,0.68);}
.app.chat-mode .compose-fab{opacity:0;pointer-events:none;}
</style>
</head>

<!-- ── PANE B: CHAT ──────────────────────── -->
<div class="pane" id="paneChat">

    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<!-- Compose FAB -->
<button class="compose-fab" aria-label="New message" title="New message">✏️</button>

<!-- Bottom Nav -->
<nav class="btm-nav">
  <div class="btm-tab" onclick="setNavTab(this)"><div class="btm-ico">🏠</div><span class="btm-lbl">Home</span></div>
  <div class="btm-tab" onclick="setNavTab(this)"><div class="btm-ico">🔍</div><span class="btm-lbl">Discover</span></div>

</nav>

</div><!-- /.app -->

/* ── Build conversation item ──────────────── */
function makeConvItem(c, hidden) {
  const div = document.createElement("div");
  div.className = "conv-item" + (c.unread > 0 ? " unread" : "") + (hidden ? " hidden" : "");
  div.dataset.id = c.id;
  div.innerHTML = `
    <div class="conv-ava-wrap">
      <div class="conv-ava" style="background:linear-gradient(135deg,${c.c},${c.g})">${c.ini}</div>
      ${c.online ? '<div class="conv-online"></div>' : ""}
    </div>
    <div class="conv-body">
      <div class="conv-name-row">
        <span class="conv-name">${c.name}</span>
        <span class="conv-time">${c.time}</span>
      </div>
      <div class="conv-last-row">
        <span class="conv-last">${c.lastMsg}</span>
        ${c.unread > 0 ? `<span class="unread-badge">${c.unread}</span>` : ""}
      </div>
    </div>`;
  div.addEventListener("click", () => openChat(c.id));
  return div;
}

function renderInbox(query) {
  const list = document.getElementById("convList");
  list.innerHTML = "";
  const q = (query || "").toLowerCase();
  CONVS.forEach(c => {
    if (q && !c.name.toLowerCase().includes(q) && !c.lastMsg.toLowerCase().includes(q)) return;
    list.appendChild(makeConvItem(c));
  });
}

/* ── Open chat ────────────────────────────── */
function openChat(id) {
  activeChatId = id;
  const c = CONVS.find(x => x.id === id);
  if (!c) return;

  // Update nav
  const ava = document.getElementById("chatHdAva");
  ava.style.background = `linear-gradient(135deg,${c.c},${c.g})`;
  ava.childNodes[0].textContent = "";
  // Re-inject initials text
  let txt = ava.querySelector(".ava-txt");
  if (!txt) { txt = document.createElement("span"); txt.className = "ava-txt"; ava.prepend(txt); }
  txt.textContent = c.ini;
  txt.style.cssText = "font-size:12px;font-weight:700;color:#fff;";

  const onlineEl = document.getElementById("chatHdOnline");
  onlineEl.style.display = c.online ? "block" : "none";

  document.getElementById("chatHdName").textContent = c.name;
  const statusEl = document.getElementById("chatHdStatus");
  if (c.online) {
    statusEl.textContent = "Online now";
    statusEl.className = "chat-hd-status online-txt";
  } else {
    statusEl.textContent = c.handle;
    statusEl.className = "chat-hd-status";
  }

  // Mark unread = 0
  const conv = CONVS.find(x => x.id === id);
  if (conv) conv.unread = 0;

  // Render messages
  renderMessages(id);

  // Switch to chat mode
  document.getElementById("app").classList.add("chat-mode");

  // Scroll to bottom
  requestAnimationFrame(() => {
    const ml = document.getElementById("msgList");
    ml.scrollTop = ml.scrollHeight;
  });

  // Typing indicator for NovaBrands
  clearTimeout(typingTimer);
  const typingEl = document.getElementById("typingIndicator");
  if (typingEl) typingEl.remove();

  if (id === 1) {
    typingTimer = setTimeout(() => {
      const ml = document.getElementById("msgList");
      const trow = document.createElement("div");
      trow.className = "typing-row";
      trow.id = "typingIndicator";
      const tava = document.createElement("div");
      tava.className = "msg-ava";
      tava.style.cssText = `background:linear-gradient(135deg,${conv.c},${conv.g});width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;`;
      tava.textContent = conv.ini;
      const tbub = document.createElement("div");
      tbub.className = "typing-bubble";
      tbub.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      trow.appendChild(tava);
      trow.appendChild(tbub);
      ml.appendChild(trow);
      ml.scrollTop = ml.scrollHeight;

      // Remove typing after 4s and add new message
      setTimeout(() => {
        trow.remove();
        const newMsg = {id: Date.now(), from:"them", text:"See you then! Looking forward to it 🎉", time:"Now"};
        THREADS[1].push(newMsg);
        renderMessages(1);
        const ml2 = document.getElementById("msgList");
        ml2.scrollTop = ml2.scrollHeight;
      }, 4000);
    }, 2200);
  }
}

/* ── Render messages ──────────────────────── */
function renderMessages(id) {
  const msgs  = THREADS[id] || [];
  const conv  = CONVS.find(x => x.id === id);
  const ml    = document.getElementById("msgList");
  ml.innerHTML = "";

  // Date separator
  const ds = document.createElement("div");
  ds.className = "date-sep";
  ds.innerHTML = `<span>${id === 1 ? "Today" : "Recent"}</span>`;
  ml.appendChild(ds);

  msgs.forEach((m, i) => {
    const prev = msgs[i - 1];
    const next = msgs[i + 1];
    const sameAsPrev = prev && prev.from === m.from;
    const sameAsNext = next && next.from === m.from;
    const isFirst  = !sameAsPrev;
    const isLast   = !sameAsNext;
    const isOut    = m.from === "me";

    const row = document.createElement("div");
    let rowCls = "msg-row" + (isOut ? " out" : " in");
    if (isFirst)       rowCls += " gap";
    if (sameAsPrev && !isLast)  rowCls += (isOut ? " seq-out" : " seq-in");
    if (isLast && sameAsPrev)   rowCls += (isOut ? " last-out" : " last-in");
    row.className = rowCls;

    // Avatar (only on last message in a group for incoming)
    const avaEl = document.createElement("div");
    if (!isOut) {
      if (isLast) {
        avaEl.className = "msg-ava";
        avaEl.style.background = `linear-gradient(135deg,${conv.c},${conv.g})`;
        avaEl.textContent = conv.ini;
      } else {
        avaEl.className = "msg-ava placeholder";
      }
    }

    // Bubble
    const bubble = document.createElement("div");
    bubble.className = isOut ? "bubble bubble-out" : "bubble bubble-in";

    // Text
    const txt = document.createElement("div");
    txt.textContent = m.text;
    bubble.appendChild(txt);

    // Meta (time + receipt for outgoing)
    const meta = document.createElement("div");
    meta.className = "msg-meta";
    if (isOut) {
      // Receipt indicator (last outgoing message gets status)
      const isVeryLast = i === msgs.length - 1 || msgs.slice(i+1).every(x => x.from !== "me");
      if (isVeryLast) {
        const receipt = document.createElement("span");
        // Determine status
        const idx = msgs.filter(x => x.from === "me").indexOf(m);
        const total = msgs.filter(x => x.from === "me").length;
        if (idx < total - 2) { receipt.className = "msg-receipt read"; receipt.textContent = "✓✓"; }
        else if (idx < total - 1) { receipt.className = "msg-receipt delivered"; receipt.textContent = "✓✓"; }
        else { receipt.className = "msg-receipt sent"; receipt.textContent = "✓"; }
        meta.appendChild(receipt);
      }
    }
    const timeEl = document.createElement("span");
    timeEl.className = "msg-time";
    timeEl.textContent = m.time;
    meta.appendChild(timeEl);
    if (meta.children.length) bubble.appendChild(meta);

    if (!isOut) row.appendChild(avaEl);
    row.appendChild(bubble);
    ml.appendChild(row);
  });
}

/* ── Go back to inbox ─────────────────────── */
function goInbox() {
  document.getElementById("app").classList.remove("chat-mode");
  clearTimeout(typingTimer);
  const ti = document.getElementById("typingIndicator");
  if (ti) ti.remove();
  activeChatId = null;
  renderInbox();
  document.getElementById("msgInp").value = "";
  document.getElementById("sendBtn").classList.remove("ready");
}

/* ── Message input ────────────────────────── */
function onInput(el) {
  // Auto-resize
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
  // Toggle send button
  document.getElementById("sendBtn").classList.toggle("ready", el.value.trim().length > 0);
}

function sendMessage() {
  const inp = document.getElementById("msgInp");
  const text = inp.value.trim();
  if (!text || activeChatId === null) return;

  const thread = THREADS[activeChatId];
  thread.push({ id: Date.now(), from: "me", text, time: "Now" });

  // Update conversation preview
  const conv = CONVS.find(x => x.id === activeChatId);
  if (conv) conv.lastMsg = text;

  inp.value = "";
  inp.style.height = "auto";
  document.getElementById("sendBtn").classList.remove("ready");
  renderMessages(activeChatId);

  const ml = document.getElementById("msgList");
  requestAnimationFrame(() => { ml.scrollTop = ml.scrollHeight; });
}

/* Send on Enter (Shift+Enter for newline) */
document.getElementById("msgInp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

/* Search */
document.getElementById("searchInp").addEventListener("input", e => {
  renderInbox(e.target.value);
});

function setNavTab(el) {
  document.querySelectorAll(".btm-tab").forEach(t => t.classList.remove("act"));
  el.classList.add("act");
}

/* ── Init ─────────────────────────────────── */
renderInbox();
</script>
